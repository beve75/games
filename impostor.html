<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕵️‍♂️ Impostore Pro: 2000 Parole</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --danger: #ff7675;
            --success: #55efc4; --warning: #fdcb6e; --bg: #f0f3f7; --text: #2d3436;
        }
        body {
            font-family: 'Montserrat', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; padding: 10px;
            user-select: none; -webkit-user-select: none;
        }
        .container {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px;
            text-align: center; position: relative; max-height: 95vh; overflow-y: auto;
        }
        .hidden { display: none; }
        h1 { color: var(--primary); margin: 0 0 15px 0; font-size: 1.6rem; }
        .input-group { margin-bottom: 15px; display: flex; gap: 8px; }
        input[type="text"] {
            padding: 12px; border: 2px solid #dfe6e9; border-radius: 12px;
            flex-grow: 1; font-size: 16px; outline: none;
        }
        #player-list { 
            list-style: none; padding: 0; margin-bottom: 15px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }
        #player-list li {
            background: #f8f9fa; padding: 6px 10px; border-radius: 8px;
            display: flex; justify-content: space-between; font-size: 0.85rem;
        }
        .category-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 6px; margin-bottom: 15px; 
        }
        .cat-btn {
            padding: 8px 4px; border: 2px solid #eee; border-radius: 10px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 0.75rem;
            font-weight: 600;
        }
        .cat-btn.active { border-color: var(--primary); background: var(--secondary); color: white; }
        
        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #f1f2f6; border-radius: 12px; padding: 10px 15px; margin-bottom: 15px;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        button.main-btn {
            padding: 15px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%;
            transition: 0.2s;
        }
        .btn-start { background: var(--primary); color: white; }
        .btn-reveal { background: #2d3436; color: white; min-height: 120px; font-size: 1.4rem; margin: 20px 0; border: 4px dashed var(--secondary); }
        .btn-reveal:active { background: #4834d4; }
        
        .starter-badge { background: var(--warning); padding: 15px; border-radius: 15px; margin: 15px 0; border: 2px solid #f1c40f; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container">
        <h1>🕵️‍♂️ L'Impostore</h1>
        <div class="input-group">
            <input type="text" id="name-input" placeholder="Nome..." onkeypress="if(event.key==='Enter') addPlayer()">
            <button onclick="addPlayer()" style="background:var(--secondary); color:white; border-radius:12px; border:none; padding:0 15px;">+</button>
        </div>
        <ul id="player-list"></ul>

        <p style="font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px 0;">TEMI (Seleziona multipli):</p>
        <div class="category-grid" id="category-grid"></div>

        <div class="switch-container">
            <span style="font-size: 0.85rem; font-weight: 600;">Parole Complesse 🧪</span>
            <label class="switch">
                <input type="checkbox" id="complex-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <button id="btn-play" class="main-btn btn-start" style="display:none;" onclick="prepareGame()">INIZIA PARTITA</button>
    </div>

    <div id="reveal-screen" class="container hidden">
        <h2 id="current-player-name" style="color:var(--primary); margin:0;">---</h2>
        <p style="font-size: 0.9rem;">Tieni premuto per vedere il tuo ruolo.</p>
        <button id="hold-area" class="main-btn btn-reveal" 
             onmousedown="showWord()" onmouseup="hideWord()" onmouseleave="hideWord()"
             ontouchstart="showWord(event)" ontouchend="hideWord(event)">
            TIENI PREMUTO
        </button>
        <button id="next-btn" class="main-btn hidden" style="background:var(--success); color:white;" onclick="nextTurn()">HO VISTO, PASSA!</button>
    </div>

    <div id="final-screen" class="container hidden">
        <h1>🚀 Si comincia!</h1>
        <div class="starter-badge">
            🎤 Inizia a parlare:<br>
            <strong id="starting-player" style="font-size: 1.4rem;">---</strong>
        </div>
        <button class="main-btn btn-start" onclick="prepareGame()">NUOVA PARTITA</button>
        <button class="main-btn" style="background:none; color:var(--primary); margin-top:10px;" onclick="backToSetup()">INDIETRO</button>
    </div>

        const adjectives = ["Spaziale", "Invisibile", "Gigante", "Magico", "Robotico", "Colorato", "Puzzolente", "Volante", "Miniatura", "Parlante", "Radiante", "Ghiacciato", "Infuocato", "Sottosopra", "Antico", "Cyberpunk", "Elettrico", "Saggio", "Furioso", "Timido"];

        let players = [];
        let selectedCategories = new Set(['cibo', 'animali']);
        let currentWord = "";
        let imposterIndex = -1;
        let currentPlayerIndex = 0;

        function initCategories() {
            const grid = document.getElementById('category-grid');
            const icons = { cibo: "🍕", animali: "🦁", fantasy: "🧙‍♂️", oggetti: "🎸", sport: "⚽", mestieri: "👨‍🚒", luoghi: "🗼", film: "🎬", supereroi: "🦸‍♂️" };
            Object.keys(library).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${selectedCategories.has(cat) ? 'active' : ''}`;
                btn.innerHTML = `${icons[cat]}<br>${cat.toUpperCase()}`;
                btn.onclick = () => toggleCategory(cat, btn);
                grid.appendChild(btn);
            });
        }

        function toggleCategory(cat, btn) {
            if (selectedCategories.has(cat) && selectedCategories.size > 1) {
                selectedCategories.delete(cat);
                btn.classList.remove('active');
            } else {
                selectedCategories.add(cat);
                btn.classList.add('active');
            }
        }

        function addPlayer() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (name && players.length < 20) {
                players.push(name);
                updateList();
                input.value = '';
                input.focus();
            }
        }

        function updateList() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map((p, i) => `<li>${p} <span onclick="players.splice(${i},1);updateList()" style="color:var(--danger); cursor:pointer;">✕</span></li>`).join('');
            document.getElementById('btn-play').style.display = players.length >= 3 ? 'block' : 'none';
        }

        function prepareGame() {
            const isComplex = document.getElementById('complex-toggle').checked;
            let allWords = [];
            selectedCategories.forEach(cat => allWords = allWords.concat(library[cat]));
            
            let word = allWords[Math.floor(Math.random() * allWords.length)];
            if (isComplex && Math.random() > 0.6) {
                word += " " + adjectives[Math.floor(Math.random() * adjectives.length)];
            }
            
            currentWord = word;
            imposterIndex = Math.floor(Math.random() * players.length);
            currentPlayerIndex = 0;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('final-screen').classList.add('hidden');
            document.getElementById('reveal-screen').classList.remove('hidden');
            updateTurnUI();
        }

        function updateTurnUI() {
            document.getElementById('current-player-name').innerText = `Tocca a: ${players[currentPlayerIndex]}`;
            document.getElementById('hold-area').innerText = "TIENI PREMUTO";
            document.getElementById('next-btn').classList.add('hidden');
        }

        function showWord(e) {
            if(e) e.preventDefault();
            const area = document.getElementById('hold-area');
            area.innerHTML = (currentPlayerIndex === imposterIndex) ? "<span style='color:var(--danger)'>SEI L'IMPOSTORE! 🤫</span>" : currentWord.toUpperCase();
        }

        function hideWord(e) {
            if(e) e.preventDefault();
            document.getElementById('hold-area').innerText = "TIENI PREMUTO";
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextTurn() {
            currentPlayerIndex++;
            if (currentPlayerIndex < players.length) {
                updateTurnUI();
            } else {
                document.getElementById('starting-player').innerText = players[Math.floor(Math.random() * players.length)];
                document.getElementById('reveal-screen').classList.add('hidden');
                document.getElementById('final-screen').classList.remove('hidden');
            }
        }

        function backToSetup() {
            document.getElementById('final-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        initCategories();
    </script>
