<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Segnapunti Fullscreen</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            user-select: none; -webkit-user-select: none;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        .team {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.1s;
        }

        .team-a { background-color: #1a472a; border-right: 1px solid #000; }
        .team-b { background-color: #1a2a47; }

        .score { font-size: 35vw; font-weight: 900; color: white; pointer-events: none; }

        #fullscreen-btn {
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            color: white; border: none; padding: 10px 20px;
            border-radius: 20px; z-index: 100;
        }

        #reset-zone {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>

<button id="fullscreen-btn" onclick="goFullscreen()">MODALITÀ TUTTO SCHERMO</button>

<div class="container">
    <div class="team team-a" onclick="handleTouch(this)">
        <div class="score">0</div>
    </div>
    <div class="team team-b" onclick="handleTouch(this)">
        <div class="score">0</div>
    </div>
</div>

<div id="reset-zone" onclick="resetScores()">RESET (LONG PRESS)</div>

<script>
    let timer = null;

    function goFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        }
        document.getElementById('fullscreen-btn').style.display = 'none';
    }

    function handleTouch(element) {
        if (timer == null) {
            timer = setTimeout(() => {
                updateScore(element, 1);
                timer = null;
            }, 250);
        } else {
            clearTimeout(timer);
            timer = null;
            updateScore(element, -1);
        }
    }

    function updateScore(element, delta) {
        const scoreDisplay = element.querySelector('.score');
        let current = parseInt(scoreDisplay.innerText);
        if (current + delta >= 0) scoreDisplay.innerText = current + delta;
    }

    function resetScores() {
        if(confirm("Azzerare?")) {
            document.querySelectorAll('.score').forEach(s => s.innerText = '0');
        }
    }

    // Blocca lo scroll e lo zoom residuo
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>
</body>
</html>
